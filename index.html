<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kısmet Rot Balans PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#0b1220;
  color:white;
}

/* TOP */
.top{
  background:#0f172a;
  padding:18px;
  text-align:center;
  font-weight:600;
  letter-spacing:1px;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.menu:hover{
  background:#2563eb;
}

/* CONTENT */
.content{
  flex:1;
  padding:25px;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* CARD */
.card{
  background:#111827;
  padding:20px;
  margin:12px 0;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:8px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  background:#111827;
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border-bottom:1px solid #1f2937;
}

th{
  background:#1f2937;
  text-align:left;
}

.del{
  background:red;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="top">KISMET ROT BALANS | PRO PANEL</div>

<div class="container">

<div class="sidebar">

  <div class="menu" onclick="show('home')">Ana Sayfa</div>
  <div class="menu" onclick="show('services')">Hizmetler</div>
  <div class="menu" onclick="show('randevu')">Kayıt</div>
  <div class="menu" onclick="show('admin')">Kayıtlar</div>

</div>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>Hoşgeldin 👋</h2>
    <p>Profesyonel oto servis yönetim paneli</p>
  </div>

  <div class="card">
    📍 Konum: İstanbul<br>
    📞 0531 972 45 08
  </div>
</div>

<!-- SERVICES -->
<div id="services" class="section">
  <div class="card">🚗 Rot Ayarı - 700 TL</div>
  <div class="card">⚙️ Balans - 500 TL</div>
  <div class="card">🛢️ Yağ Değişimi - 200 TL</div>
</div>

<!-- KAYIT -->
<div id="randevu" class="section">

  <div class="card">
    <input id="isim" placeholder="Müşteri Adı">
    <input id="tel" placeholder="Telefon">
    <input id="hizmet" placeholder="Hizmet">
    <input id="fiyat" placeholder="Fiyat">
    <button onclick="ekle()">Kaydet</button>
  </div>

</div>

<!-- ADMIN -->
<div id="admin" class="section">

  <table>
    <thead>
      <tr>
        <th>İsim</th>
        <th>Telefon</th>
        <th>Hizmet</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>

let data=[];

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let tel=document.getElementById("tel").value;
  let hizmet=document.getElementById("hizmet").value;
  let fiyat=document.getElementById("fiyat").value;

  if(!isim || !hizmet) return;

  data.push({isim,tel,hizmet,fiyat});
  render();
}

function render(){

  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    list.innerHTML+=`
      <tr>
        <td>${d.isim}</td>
        <td>${d.tel}</td>
        <td>${d.hizmet}</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;
  });

}

function sil(i){
  data.splice(i,1);
  render();
}

render();

</script>

</body>
</html>
