<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
body{margin:0;font-family:system-ui;background:#f4f6f8;}

header{background:#111;color:#fff;text-align:center;padding:15px;}

.section{max-width:900px;margin:auto;padding:20px;}

.card{
  background:white;padding:15px;
  border-radius:10px;margin:10px 0;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,select{
  width:100%;padding:10px;margin:5px 0;
  border-radius:8px;border:1px solid #ccc;
}

button{
  padding:10px;background:#111;color:#fff;
  border:none;border-radius:8px;cursor:pointer;
}

.wp{
  position:fixed;right:20px;bottom:20px;
  background:#25D366;color:white;
  padding:15px;border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h2>Kısmet Rot Balans</h2>
  <p>Randevu Sistemi</p>
</header>

<!-- RANDEVU -->
<div class="section">
  <h2>Randevu Al</h2>

  <div class="card">
    <input id="name" placeholder="İsim">
    <input id="phone" placeholder="Telefon">

    <select id="time">
      <option value="">Saat seç</option>
      <option>09:00</option>
      <option>10:00</option>
      <option>11:00</option>
      <option>13:00</option>
      <option>14:00</option>
    </select>

    <button onclick="save()">Gönder</button>
    <p id="msg"></p>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="section">
  <h2>Admin Giriş</h2>

  <div class="card">
    <input type="password" id="pass" placeholder="Şifre">
    <button onclick="login()">Giriş</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <h3>Randevular</h3>
    <button onclick="load()">Yenile</button>
    <div id="list"></div>
  </div>
</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBkBB4w03UMQ2dFKY-B_1dgOZGnk-J5dLg",
  authDomain: "kismet-rot-balans.firebaseapp.com",
  projectId: "kismet-rot-balans",
  storageBucket: "kismet-rot-balans.appspot.com",
  messagingSenderId: "350629465784",
  appId: "1:350629465784:web:33f91cad2a724e0f45ee4d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>

// RANDEVU
async function save(){

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const time=document.getElementById("time").value;
  const msg=document.getElementById("msg");

  if(!name || !phone || !time){
    msg.innerText="Boş bırakma ❌";
    return;
  }

  const check = await db.collection("randevular")
    .where("time","==",time)
    .get();

  if(!check.empty){
    msg.innerText="Bu saat dolu ❌";
    return;
  }

  await db.collection("randevular").add({
    name, phone, time
  });

  msg.innerText="Randevu alındı ✔";
}

// ADMIN LOGIN
function login(){
  const pass=document.getElementById("pass").value;

  if(pass==="1234"){
    document.getElementById("adminPanel").style.display="block";
    alert("Giriş başarılı");
  }else{
    alert("Hatalı şifre");
  }
}

// LOAD
async function load(){

  const snap = await db.collection("randevular").get();

  let html="";

  snap.forEach(doc=>{
    let d=doc.data();

    html += `
      <div class="card">
        <b>${d.name}</b><br>
        ${d.phone}<br>
        ${d.time}<br>
        <button onclick="del('${doc.id}')">Sil</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

// DELETE
async function del(id){
  await db.collection("randevular").doc(id).delete();
  load();
}

</script>

</body>
</html>
