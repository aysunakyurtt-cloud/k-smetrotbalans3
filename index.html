<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oto Servis PRO V3</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#0b1220;
  color:white;
}

.top{
  background:#0f172a;
  padding:16px;
  text-align:center;
  font-weight:700;
}

.container{display:flex;}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
}

.menu:hover{background:#2563eb;}

.content{flex:1;padding:20px;}

.section{display:none;}
.section.active{display:block;}

/* CARD */
.card{
  background:#111827;
  padding:18px;
  margin:10px 0;
  border-radius:12px;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border-bottom:1px solid #1f2937;
  text-align:left;
}

th{background:#1f2937;}

.del{
  background:red;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* DASH */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.small{
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search{
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top">OTO SERVİS CRM PRO V3</div>

<div class="container">

<div class="sidebar">

  <div class="menu" onclick="show('dash')">Dashboard</div>
  <div class="menu" onclick="show('add')">Yeni Kayıt</div>
  <div class="menu" onclick="show('list')">Kayıtlar</div>

</div>

<div class="content">

<!-- DASH -->
<div id="dash" class="section active">

  <div class="grid">

    <div class="card">
      Toplam İşlem<br>
      <div class="small" id="total">0</div>
    </div>

    <div class="card">
      Toplam Gelir<br>
      <div class="small" id="income">0 TL</div>
    </div>

    <div class="card">
      Ortalama<br>
      <div class="small" id="avg">0 TL</div>
    </div>

  </div>

</div>

<!-- ADD -->
<div id="add" class="section">

  <div class="card">

    <input id="isim" placeholder="Müşteri">
    <input id="tel" placeholder="Telefon">

    <select id="hizmet">
      <option>Rot Ayarı</option>
      <option>Balans</option>
      <option>Yağ Değişimi</option>
      <option>Fren Bakım</option>
    </select>

    <input id="fiyat" placeholder="Fiyat">

    <button onclick="ekle()">Kaydet</button>

  </div>

</div>

<!-- LIST -->
<div id="list" class="section">

  <input class="search" id="search" placeholder="Ara..." oninput="render()">

  <table>
    <thead>
      <tr>
        <th>İsim</th>
        <th>Hizmet</th>
        <th>Fiyat</th>
        <th>Tarih</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("pro_v3") || "[]");

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let tel=document.getElementById("tel").value;
  let hizmet=document.getElementById("hizmet").value;
  let fiyat=parseFloat(document.getElementById("fiyat").value)||0;

  if(!isim || !hizmet) return;

  data.push({
    isim,
    tel,
    hizmet,
    fiyat,
    tarih:new Date().toLocaleDateString()
  });

  localStorage.setItem("pro_v3",JSON.stringify(data));

  render();
}

function render(){

  let table=document.getElementById("table");
  table.innerHTML="";

  let search=document.getElementById("search")?.value?.toLowerCase() || "";

  let total=0;

  let filtered=data.filter(d=>{
    return d.isim.toLowerCase().includes(search) ||
           d.hizmet.toLowerCase().includes(search);
  });

  filtered.forEach((d,i)=>{

    total+=d.fiyat;

    table.innerHTML+=`
      <tr>
        <td>${d.isim}</td>
        <td>${d.hizmet}</td>
        <td>${d.fiyat} TL</td>
        <td>${d.tarih}</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText=data.length;
  document.getElementById("income").innerText=total+" TL";

  let avg = data.length ? (total / data.length).toFixed(1) : 0;
  document.getElementById("avg").innerText=avg+" TL";
}

function sil(i){
  data.splice(i,1);
  localStorage.setItem("pro_v3",JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
