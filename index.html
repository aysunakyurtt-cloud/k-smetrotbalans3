<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oto Servis CRM PRO</title>

<style>
:root{
  --dark:#0f172a;
  --primary:#2563eb;
  --bg:#f1f5f9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{background:var(--bg);}

/* TOP */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--dark);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:600;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--dark);
  position:fixed;
  padding-top:70px;
}

.menu{
  margin:10px;
  padding:12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:80px 20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

.del{
  background:red;
  padding:6px 10px;
  border:none;
  color:white;
  border-radius:8px;
}

/* GRAPH */
.bar{
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  background:var(--primary);
}
</style>
</head>

<body>

<div class="topbar">Oto Servis CRM PRO | Dashboard</div>

<div class="sidebar">
  <div class="menu active" onclick="show('dash',this)">Dashboard</div>
  <div class="menu" onclick="show('yeni',this)">Yeni İş</div>
  <div class="menu" onclick="show('arac',this)">Araçlar</div>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash" class="section active">

  <div class="grid">

    <div class="card">
      <h3>Toplam İş</h3>
      <h2 id="total">0</h2>
    </div>

    <div class="card">
      <h3>Toplam Gelir</h3>
      <h2 id="gelir">0 TL</h2>
    </div>

    <div class="card">
      <h3>Bugün</h3>
      <h2 id="today">0</h2>
    </div>

  </div>

  <div class="card" style="margin-top:15px;">
    <h3>Son İşlemler</h3>
    <div id="last"></div>
  </div>

</div>

<!-- YENİ -->
<div id="yeni" class="section">

  <h2>Yeni Servis</h2>

  <input id="isim" placeholder="Müşteri">
  <input id="plaka" placeholder="Plaka">
  <input id="hizmet" placeholder="İşlem">
  <input id="fiyat" placeholder="Fiyat">

  <button onclick="ekle()">Kaydet</button>

</div>

<!-- ARAÇ -->
<div id="arac" class="section">

  <input id="search" placeholder="Plaka ara" oninput="render()">

  <table>
    <thead>
      <tr>
        <th>Plaka</th>
        <th>İşlem</th>
        <th>Fiyat</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("crmpro") || "[]");

function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let plaka=document.getElementById("plaka").value;
  let hizmet=document.getElementById("hizmet").value;
  let fiyat=parseFloat(document.getElementById("fiyat").value)||0;

  if(!isim || !plaka){
    alert("Eksik bilgi");
    return;
  }

  data.push({
    isim,plaka,hizmet,fiyat,date:new Date().toISOString()
  });

  localStorage.setItem("crmpro",JSON.stringify(data));

  render();
}

function render(){

  let list=document.getElementById("list");
  if(!list) return;
  list.innerHTML="";

  let search=document.getElementById("search")?.value?.toLowerCase() || "";

  let filtered = data.filter(d=>d.plaka.toLowerCase().includes(search));

  let total=0;
  let todayCount=0;

  let today=new Date().toISOString().split("T")[0];

  let last=document.getElementById("last");
  if(last) last.innerHTML="";

  filtered.forEach((d,i)=>{

    total+=d.fiyat;
    if(d.date.startsWith(today)) todayCount++;

    list.innerHTML+=`
      <tr>
        <td>${d.plaka}</td>
        <td>${d.hizmet}</td>
        <td>${d.fiyat} TL</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;

  });

  document.getElementById("total").innerText=data.length;
  document.getElementById("gelir").innerText=total+" TL";
  document.getElementById("today").innerText=todayCount;

  filtered.slice(-5).forEach(d=>{
    last.innerHTML+=`
      <div class="card">
        ${d.plaka} - ${d.hizmet} - ${d.fiyat} TL
      </div>
    `;
  });

}

function sil(i){
  data.splice(i,1);
  localStorage.setItem("crmpro",JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
