<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SaaS CRM FINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#0b1220;color:white;}

.top{
  background:#0f172a;
  padding:15px;
  text-align:center;
  font-weight:700;
}

.box{
  max-width:420px;
  margin:40px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.panel{display:none;padding:20px;}

.card{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

/* DASH */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.small{font-size:22px;font-weight:bold;}
</style>
</head>

<body>

<div class="top">SAAS CRM FINAL SYSTEM</div>

<!-- LOGIN -->
<div id="login" class="box">

  <h3>Giriş / Kayıt</h3>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Şifre">

  <button onclick="register()">Kayıt</button>
  <button onclick="login()">Giriş</button>

</div>

<!-- PANEL -->
<div id="panel" class="panel">

  <div class="grid">

    <div class="card">
      Toplam Kayıt<br>
      <div class="small" id="total">0</div>
    </div>

    <div class="card">
      Gelir<br>
      <div class="small" id="income">0 TL</div>
    </div>

  </div>

  <div class="card">

    <input id="isim" placeholder="Müşteri">
    <input id="hizmet" placeholder="Hizmet">
    <input id="fiyat" placeholder="Fiyat">

    <button onclick="ekle()">Kaydet</button>

  </div>

  <div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 FIREBASE CONFIG (BURAYA KENDİNİN KEYİNİ KOY)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.login = async function(){
  await signInWithEmailAndPassword(auth,email.value,pass.value);
}

// REGISTER
window.register = async function(){
  await createUserWithEmailAndPassword(auth,email.value,pass.value);
}

// CHECK USER
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
    load();
  }
});

// ADD
window.ekle = async function(){

  let user = auth.currentUser;

  await addDoc(collection(db,"crm"),{
    uid:user.uid,
    isim:isim.value,
    hizmet:hizmet.value,
    fiyat:parseFloat(fiyat.value)||0
  });

  load();
}

// LOAD
async function load(){

  let user=auth.currentUser;

  let q=query(collection(db,"crm"),where("uid","==",user.uid));
  let snap=await getDocs(q);

  let list=document.getElementById("list");
  list.innerHTML="";

  let total=0;

  snap.forEach(doc=>{
    let d=doc.data();
    total+=d.fiyat;

    list.innerHTML+=`
      <div class="card">
        ${d.isim} - ${d.hizmet} - ${d.fiyat} TL
      </div>
    `;
  });

  document.getElementById("total").innerText=snap.size;
  document.getElementById("income").innerText=total+" TL";
}

</script>

</body>
</html>
