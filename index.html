<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  display:flex;
  background:#f6f7fb;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#0f0f0f;
  color:white;
  padding:20px;
  position:fixed;
}

.sidebar h2{
  margin-bottom:20px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.menu:hover{
  transform:translateX(5px);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  width:100%;
  padding:25px;
}

/* SECTIONS */
.section{
  display:none;
}

.active{
  display:block;
}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  border-radius:15px;
  text-align:center;
}

.hero h1{
  font-size:55px;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:220px;
  border:1px solid #ddd;
}

/* PANEL */
.panel{
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:12px;
}

.randevu{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.badge{
  background:#25D366;
  color:white;
  padding:6px 10px;
  border-radius:20px;
  text-decoration:none;
  font-size:12px;
}

/* IFRAME */
iframe{
  width:100%;
  height:600px;
  border:none;
  border-radius:12px;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    width:70px;
  }

  .menu{
    font-size:12px;
  }

  .content{
    margin-left:70px;
  }

  .sidebar h2{
    display:none;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🚗 Kısmet</h2>

<div class="menu active" onclick="show('home', this)">Ana</div>
<div class="menu" onclick="show('services', this)">Hizmet</div>
<div class="menu" onclick="show('booking', this)">Randevu</div>
<div class="menu" onclick="show('panel', this)">Panel</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">

<div class="hero">
  <div>
    <h1>Kısmet Rot Balans</h1>
    <p>Profesyonel oto servis – İstanbul</p>
  </div>
</div>

</div>

<!-- SERVICES -->
<div id="services" class="section">

<h2>Hizmetler</h2>

<div class="cards">
  <div class="card">Rot Ayarı<br><b>700 TL</b></div>
  <div class="card">Balans<br><b>500 TL</b></div>
  <div class="card">Yağ Değişimi<br><b>200 TL</b></div>
</div>

</div>

<!-- BOOKING -->
<div id="booking" class="section">

<h2>Randevu Al</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

<!-- PANEL (GOOGLE SHEET) -->
<div id="panel" class="section">

<h2>Son Randevular</h2>

<div class="panel" id="list">
Yükleniyor...
</div>

</div>

</div>

<!-- WHATSAPP -->
<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>

/* MENU */
function show(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}

/* GOOGLE SHEET VERİ ÇEKME */
async function loadData(){

  const url = "GOOGLE_SHEET_CSV_LINK";

  try{
    const res = await fetch(url);
    const text = await res.text();

    const rows = text.split("\n").slice(1);

    let html = "";

    rows.forEach(r=>{

      const c = r.split(",");

      if(c.length > 1){

        const name = c[1] || "İsim";
        const service = c[2] || "Hizmet";

        const msg = `Yeni Randevu: ${name} - ${service}`;

        const wa = `https://wa.me/905319724508?text=${encodeURIComponent(msg)}`;

        html += `
          <div class="randevu">
            <div>${name} - ${service}</div>
            <a class="badge" href="${wa}" target="_blank">WhatsApp</a>
          </div>
        `;
      }

    });

    document.getElementById("list").innerHTML = html;

  }catch(e){
    document.getElementById("list").innerHTML = "Veri yüklenemedi";
  }

}

loadData();

</script>

</body>
</html>
