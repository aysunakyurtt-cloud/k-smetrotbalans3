<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oto Servis PRO V2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:#0b1220;
  color:white;
}

/* TOP */
.top{
  background:#0f172a;
  padding:16px;
  text-align:center;
  font-weight:700;
}

/* LAYOUT */
.container{display:flex;}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#111827;
  padding:20px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
}

.menu:hover{
  background:#2563eb;
}

/* CONTENT */
.content{
  flex:1;
  padding:20px;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* CARDS */
.card{
  background:#111827;
  padding:18px;
  margin:12px 0;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
  background:#111827;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border-bottom:1px solid #1f2937;
}

th{
  background:#1f2937;
}

.del{
  background:red;
  border:none;
  padding:6px 10px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* DASH */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.small{
  font-size:20px;
  font-weight:bold;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:14px;
  border-radius:50px;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="top">OTO SERVİS PRO V2</div>

<div class="container">

<div class="sidebar">

  <div class="menu" onclick="show('dash')">Dashboard</div>
  <div class="menu" onclick="show('add')">Yeni Kayıt</div>
  <div class="menu" onclick="show('list')">Kayıtlar</div>

</div>

<div class="content">

<!-- DASH -->
<div id="dash" class="section active">

  <div class="grid">

    <div class="card">
      Toplam Kayıt<br>
      <div class="small" id="total">0</div>
    </div>

    <div class="card">
      Toplam Gelir<br>
      <div class="small" id="income">0 TL</div>
    </div>

  </div>

</div>

<!-- ADD -->
<div id="add" class="section">

  <div class="card">

    <input id="isim" placeholder="Müşteri">
    <input id="tel" placeholder="Telefon">
    <input id="hizmet" placeholder="Hizmet">
    <input id="fiyat" placeholder="Fiyat">
    <textarea id="not" placeholder="Not"></textarea>

    <button onclick="ekle()">Kaydet</button>

  </div>

</div>

<!-- LIST -->
<div id="list" class="section">

  <table>
    <thead>
      <tr>
        <th>İsim</th>
        <th>Hizmet</th>
        <th>Fiyat</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>

let data = JSON.parse(localStorage.getItem("pro_v2") || "[]");

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let hizmet=document.getElementById("hizmet").value;
  let fiyat=parseFloat(document.getElementById("fiyat").value)||0;

  if(!isim || !hizmet) return;

  data.push({isim,hizmet,fiyat});

  localStorage.setItem("pro_v2",JSON.stringify(data));

  render();
}

function render(){

  let table=document.getElementById("table");
  table.innerHTML="";

  let totalIncome=0;

  data.forEach((d,i)=>{
    totalIncome+=d.fiyat;

    table.innerHTML+=`
      <tr>
        <td>${d.isim}</td>
        <td>${d.hizmet}</td>
        <td>${d.fiyat} TL</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText=data.length;
  document.getElementById("income").innerText=totalIncome + " TL";

}

function sil(i){
  data.splice(i,1);
  localStorage.setItem("pro_v2",JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
