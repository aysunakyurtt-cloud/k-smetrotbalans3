<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:#eef1f6;}

/* TOP */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  z-index:1000;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#111;
  color:white;
  position:fixed;
  padding:20px;
  padding-top:60px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#1f1f1f;
  border-radius:10px;
  cursor:pointer;
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:220px;
  padding:20px;
  padding-top:60px;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#fff,#eaeaea);
  border-radius:15px;
  text-align:center;
}

.hero h1{font-size:50px;}

/* CARDS */
.card{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  background:#111;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="topbar">Kısmet Rot Balans | Canlı Randevu Sistemi</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="menu active" onclick="show('home',this)">Ana</div>
  <div class="menu" onclick="show('services',this)">Hizmet</div>
  <div class="menu" onclick="show('randevu',this)">Randevu</div>
  <div class="menu" onclick="show('admin',this)">Admin</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <div>
      <h1>Kısmet Rot Balans</h1>
      <p>Profesyonel Servis Sistemi</p>
    </div>
  </div>
</div>

<!-- SERVICES -->
<div id="services" class="section">
  <h2>Hizmetler</h2>
  <div class="card">Rot Ayarı - 700 TL</div>
  <div class="card">Balans - 500 TL</div>
  <div class="card">Yağ Değişimi - 200 TL</div>
</div>

<!-- RANDEVU -->
<div id="randevu" class="section">
  <h2>Randevu Al</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"
  style="width:100%;height:500px;border:none;"></iframe>

</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h2>Canlı Randevular</h2>
  <button onclick="loadData()">Verileri Yükle</button>

  <table id="table">
    <tr>
      <th>İsim</th>
      <th>Telefon</th>
      <th>Hizmet</th>
    </tr>
  </table>
</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>
function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}

/* GOOGLE SHEET VERİ ÇEKME */
async function loadData(){

  // 🔴 BURAYA KENDİ CSV LİNKİNİ KOY
  let url="BURAYA_CSV_LINK";

  let res=await fetch(url);
  let data=await res.text();

  let rows=data.split("\n");

  let table=document.getElementById("table");

  // tabloyu temizle
  table.innerHTML = `
  <tr>
    <th>İsim</th>
    <th>Telefon</th>
    <th>Hizmet</th>
  </tr>
  `;

  for(let i=1;i<rows.length;i++){
    let cols=rows[i].split(/,|;/);

    // Google Formda ilk sütun timestamp olduğu için 1-2-3 alıyoruz
    if(cols.length>3){
      let row=document.createElement("tr");

      row.innerHTML=`
        <td>${cols[1]}</td>
        <td>${cols[2]}</td>
        <td>${cols[3]}</td>
      `;

      table.appendChild(row);
    }
  }
}
</script>

</body>
</html>
