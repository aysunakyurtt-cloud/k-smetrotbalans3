<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
:root{
  --primary:#111;
  --bg:#f6f7fb;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:var(--bg);color:#111;}

/* HEADER */
.header{
  background:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{font-size:38px;}

.btn{
  display:inline-block;
  padding:12px 18px;
  margin-top:15px;
  border-radius:10px;
  text-decoration:none;
  background:var(--primary);
  color:white;
}

/* SECTIONS */
.section{
  padding:50px 20px;
  text-align:center;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:260px;
  border:1px solid #eee;
}

.price{
  margin-top:10px;
  font-weight:bold;
  color:var(--primary);
}

/* FORM */
iframe{
  width:100%;
  max-width:700px;
  height:650px;
  border:none;
  border-radius:12px;
}

footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <b>🚗 Kısmet Rot Balans</b>
  <div>📞 0531 972 45 08</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Profesyonel Oto Servis</h1>
  <p>Rot • Balans • Yağ • Lastik</p>

  <a class="btn" href="#randevu">Randevu Al</a>
</div>

<!-- HİZMETLER -->
<div class="section">
  <h2>Hizmetler</h2>

  <div class="cards">
    <div class="card">
      Rot Ayarı
      <div class="price">700 TL</div>
    </div>

    <div class="card">
      Balans
      <div class="price">500 TL</div>
    </div>

    <div class="card">
      Yağ Değişimi
      <div class="price">200 TL</div>
    </div>
  </div>
</div>

<!-- RANDEVU (EN ALTA) -->
<div id="randevu" class="section">

  <h2>Online Randevu</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

<footer>
© 2026 Kısmet Rot Balans
</footer>

</body>
</html>
