<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#eef1f6;}

.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  z-index:1000;
}

.sidebar{
  width:220px;
  height:100vh;
  background:#111;
  color:white;
  position:fixed;
  padding:20px;
  padding-top:60px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#1f1f1f;
  border-radius:10px;
  cursor:pointer;
}

.menu.active{
  background:white;
  color:black;
}

.content{
  margin-left:220px;
  padding:20px;
  padding-top:60px;
}

.section{display:none;}
.section.active{display:block;}

.card{
  background:white;
  padding:20px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 15px;
  border:none;
  background:#111;
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}
</style>
</head>

<body>

<div class="topbar">Kısmet Rot Balans | Firebase Randevu Sistemi</div>

<div class="sidebar">
  <div class="menu active" onclick="show('home',this)">Ana</div>
  <div class="menu" onclick="show('randevu',this)">Randevu</div>
  <div class="menu" onclick="show('admin',this)">Admin</div>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h1>Kısmet Rot Balans</h1>
    <p>Firebase destekli randevu sistemi</p>
  </div>
</div>

<!-- RANDEVU -->
<div id="randevu" class="section">
  <div class="card">
    <h2>Randevu Al</h2>

    <input id="name" placeholder="İsim">
    <input id="phone" placeholder="Telefon">
    <input id="service" placeholder="Hizmet">

    <button onclick="save()">Randevu Gönder</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <div class="card">
    <h2>Admin Panel</h2>

    <button onclick="loadData()">Verileri Yükle</button>

    <table id="table">
      <tr>
        <th>İsim</th>
        <th>Telefon</th>
        <th>Hizmet</th>
      </tr>
    </table>
  </div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 SENİN FIREBASE KONFIGİN
const firebaseConfig = {
  apiKey: "AIzaSyBkBB4w03UMQ2dFKY-B_1dgOZGnk-J5dLg",
  authDomain: "kismet-rot-balans.firebaseapp.com",
  projectId: "kismet-rot-balans",
  storageBucket: "kismet-rot-balans.firebasestorage.app",
  messagingSenderId: "350629465784",
  appId: "1:350629465784:web:33f91cad2a724e0f45ee4d"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GLOBAL
window.db = db;
window.addDoc = addDoc;
window.collection = collection;
window.getDocs = getDocs;

</script>

<script>

// MENU
function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}

// SAVE RANDEVU
async function save(){

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const service=document.getElementById("service").value;

  if(!name || !phone || !service){
    alert("Tüm alanları doldur");
    return;
  }

  await addDoc(collection(db,"randevular"),{
    name,
    phone,
    service,
    time:new Date().toISOString()
  });

  alert("Randevu alındı ✔");

  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("service").value="";
}

// LOAD ADMIN
async function loadData(){

  const snap = await getDocs(collection(db,"randevular"));

  let table=document.getElementById("table");

  table.innerHTML=`
    <tr>
      <th>İsim</th>
      <th>Telefon</th>
      <th>Hizmet</th>
    </tr>
  `;

  snap.forEach(doc=>{
    let d=doc.data();

    let tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${d.name}</td>
      <td>${d.phone}</td>
      <td>${d.service}</td>
    `;

    table.appendChild(tr);
  });
}

</script>

</body>
</html>
