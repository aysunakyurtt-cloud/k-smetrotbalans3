<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SAAS CRM SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:system-ui;background:#f1f5f9;margin:0;}
.top{background:#0f172a;color:white;padding:15px;text-align:center;}
.box{max-width:400px;margin:50px auto;background:white;padding:20px;border-radius:10px;}
input{width:100%;padding:10px;margin:5px 0;}
button{width:100%;padding:10px;background:#2563eb;color:white;border:none;}
.hidden{display:none;}
.card{background:white;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="top">SAAS CRM SYSTEM</div>

<!-- LOGIN -->
<div id="login" class="box">
  <h3>Giriş</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş Yap</button>
  <button onclick="register()">Kayıt Ol</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

  <div class="box">
    <h3>Yeni Kayıt</h3>
    <input id="isim" placeholder="İsim">
    <input id="plaka" placeholder="Plaka">
    <input id="hizmet" placeholder="Hizmet">
    <input id="fiyat" placeholder="Fiyat">
    <button onclick="ekle()">Kaydet</button>
    <button onclick="logout()">Çıkış</button>
  </div>

  <div id="list"></div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>showPanel());
}

// REGISTER
function register(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(email,pass);
}

// LOGOUT
function logout(){
  auth.signOut().then(()=>location.reload());
}

// CHECK USER
auth.onAuthStateChanged(user=>{
  if(user){
    showPanel();
  }
});

// PANEL SHOW
function showPanel(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  load();
}

// ADD DATA
function ekle(){

  let user=auth.currentUser;

  db.collection("servis").add({
    uid:user.uid,
    isim:isim.value,
    plaka:plaka.value,
    hizmet:hizmet.value,
    fiyat:fiyat.value,
    date:new Date()
  });

  load();
}

// LOAD DATA
async function load(){

  let user=auth.currentUser;
  let list=document.getElementById("list");
  list.innerHTML="";

  let snap=await db.collection("servis")
  .where("uid","==",user.uid)
  .get();

  snap.forEach(doc=>{
    let d=doc.data();

    list.innerHTML+=`
      <div class="card">
        ${d.isim} - ${d.plaka}<br>
        ${d.hizmet} - ${d.fiyat} TL
      </div>
    `;
  });

}

</script>

</body>
</html>
