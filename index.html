<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans | Profesyonel Oto Servis</title>

<style>
:root{
  --primary:#111;
  --bg:#f4f6fa;
  --card:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* LAYOUT */
body{
  display:flex;
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#0f0f0f;
  color:white;
  position:fixed;
  padding:25px;
}

.sidebar h2{
  margin-bottom:25px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  background:#1c1c1c;
  border-radius:10px;
  color:white;
  text-decoration:none;
  cursor:pointer;
  transition:0.2s;
}

.sidebar a:hover{
  background:#333;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:30px;
  width:100%;
}

/* SECTIONS */
.section{
  display:none;
  animation:fade 0.3s ease-in;
}

.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* HERO */
.hero{
  background:white;
  padding:50px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.hero h1{
  font-size:36px;
}

.hero p{
  color:#666;
  margin-top:10px;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  width:260px;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.price{
  margin-top:10px;
  font-weight:bold;
  color:var(--primary);
}

/* MAP */
iframe{
  width:100%;
  max-width:750px;
  height:300px;
  border:none;
  border-radius:12px;
  margin-top:15px;
}

/* FORM */
.form iframe{
  height:650px;
}

/* WP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚗 Kısmet Rot</h2>

  <a onclick="show('home')">Ana Sayfa</a>
  <a onclick="show('services')">Hizmetler</a>
  <a onclick="show('map')">Konum</a>
  <a onclick="show('booking')">Randevu</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <h1>Profesyonel Oto Servis</h1>
    <p>Rot • Balans • Yağ Değişimi • Lastik</p>
  </div>

</div>

<!-- SERVICES -->
<div id="services" class="section">

  <h2>Hizmetlerimiz</h2>

  <div class="cards">

    <div class="card">
      <h3>Rot Ayarı</h3>
      <p>Direksiyon hassasiyeti</p>
      <div class="price">700 TL</div>
    </div>

    <div class="card">
      <h3>Balans</h3>
      <p>Titreşimsiz sürüş</p>
      <div class="price">500 TL</div>
    </div>

    <div class="card">
      <h3>Yağ Değişimi</h3>
      <p>Motor koruma</p>
      <div class="price">200 TL</div>
    </div>

  </div>

</div>

<!-- MAP -->
<div id="map" class="section">

  <h2>Konum</h2>

  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3008.2688179220972!2d28.743977275861436!3d41.06311627134291!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa666db77665b%3A0xa3126deb0757b8f9!2zw5Z6ZWwgRGF5xLFvxJ9sdSBUxLFwIE1lcmtlemk!5e0!3m2!1str!2str!4v1777462009673!5m2!1str!2str"></iframe>

</div>

<!-- BOOKING -->
<div id="booking" class="section form">

  <h2>Online Randevu</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508" target="_blank">WhatsApp</a>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
