<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randevu Sistemi</title>

<style>
body{font-family:system-ui;margin:0;background:#eef1f6;}
.top{background:#111;color:#fff;padding:10px;text-align:center;position:fixed;top:0;left:0;right:0;}
.container{margin-top:60px;display:flex;}

.menu{width:200px;background:#111;color:#fff;height:100vh;padding:10px;}
.menu div{padding:10px;margin:5px;background:#222;cursor:pointer;border-radius:8px;}
.menu div.active{background:#fff;color:#000;}

.content{flex:1;padding:20px;}

.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;}

input,select{
  width:100%;padding:10px;margin:5px 0;
  border:1px solid #ccc;border-radius:8px;
}

button{
  padding:10px;border:none;background:#111;color:#fff;
  border-radius:8px;cursor:pointer;
}

table{width:100%;background:#fff;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #eee;}
</style>
</head>

<body>

<div class="top">Randevu Sistemi</div>

<div class="container">

<!-- MENU -->
<div class="menu">
  <div onclick="show('home')" class="active">Ana</div>
  <div onclick="show('randevu')">Randevu</div>
  <div onclick="show('admin')">Admin</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="page">
  <div class="card">
    <h2>Hoşgeldin</h2>
    <p>Basit Firebase randevu sistemi</p>
  </div>
</div>

<!-- RANDEVU -->
<div id="randevu" class="page" style="display:none">
  <div class="card">
    <h2>Randevu Al</h2>

    <input id="name" placeholder="İsim">
    <input id="phone" placeholder="Telefon">

    <select id="time">
      <option value="">Saat seç</option>
      <option>09:00</option>
      <option>10:00</option>
      <option>11:00</option>
      <option>13:00</option>
      <option>14:00</option>
      <option>15:00</option>
    </select>

    <button onclick="save()">Gönder</button>

    <p id="msg"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page" style="display:none">
  <div class="card">
    <h2>Admin Panel</h2>

    <input type="password" id="pass" placeholder="Şifre">
    <button onclick="login()">Giriş</button>

    <button onclick="load()">Yenile</button>

    <table id="table">
      <tr>
        <th>İsim</th>
        <th>Telefon</th>
        <th>Saat</th>
        <th>Sil</th>
      </tr>
    </table>
  </div>
</div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
query, where, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkBB4w03UMQ2dFKY-B_1dgOZGnk-J5dLg",
  authDomain: "kismet-rot-balans.firebaseapp.com",
  projectId: "kismet-rot-balans",
  storageBucket: "kismet-rot-balans.firebasestorage.app",
  messagingSenderId: "350629465784",
  appId: "1:350629465784:web:33f91cad2a724e0f45ee4d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.addDoc=addDoc;
window.collection=collection;
window.getDocs=getDocs;
window.query=query;
window.where=where;
window.deleteDoc=deleteDoc;
window.doc=doc;

</script>

<script>

let logged=false;

// MENU
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

// SAVE
async function save(){

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const time=document.getElementById("time").value;

  if(!name||!phone||!time){
    msg("Boş bırakma ❌");
    return;
  }

  // saat kontrol
  const q=query(collection(db,"randevular"),where("time","==",time));
  const snap=await getDocs(q);

  if(!snap.empty){
    msg("Bu saat dolu ❌");
    return;
  }

  await addDoc(collection(db,"randevular"),{
    name,phone,time
  });

  msg("Randevu alındı ✔");
}

function msg(t){
  document.getElementById("msg").innerText=t;
}

// ADMIN LOGIN
function login(){
  if(document.getElementById("pass").value==="1234"){
    logged=true;
    alert("Giriş başarılı");
  }else alert("Hatalı şifre");
}

// LOAD
async function load(){

  if(!logged){
    alert("Önce giriş yap");
    return;
  }

  const snap=await getDocs(collection(db,"randevular"));

  let table=document.getElementById("table");

  table.innerHTML=`
  <tr>
    <th>İsim</th>
    <th>Telefon</th>
    <th>Saat</th>
    <th>Sil</th>
  </tr>`;

  snap.forEach(d=>{
    let data=d.data();

    let tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${data.name}</td>
      <td>${data.phone}</td>
      <td>${data.time}</td>
      <td><button onclick="del('${d.id}')">Sil</button></td>
    `;

    table.appendChild(tr);
  });
}

// DELETE
async function del(id){
  await deleteDoc(doc(db,"randevular",id));
  load();
}

</script>

</body>
</html>
