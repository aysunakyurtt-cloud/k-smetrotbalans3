<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  display:flex;
  height:100vh;
  background:#f4f6f8;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#111;
  color:white;
  padding:15px;
}

.menu{
  padding:12px;
  margin:8px 0;
  background:#1f1f1f;
  border-radius:8px;
  cursor:pointer;
}

/* CONTENT */
.content{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* PAGE SYSTEM (ÖNEMLİ FIX) */
.page{
  display:none;
}
.page.active{
  display:block;
}

/* WHATSAPP */
.wp{
  position:fixed;
  right:15px;
  bottom:15px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    width:80px;
    padding:10px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="menu" onclick="show('home')">🏠 Ana</div>
  <div class="menu" onclick="show('services')">🔧 Hizmet</div>
  <div class="menu" onclick="show('prices')">💰 Fiyat</div>
  <div class="menu" onclick="show('appointment')">📅 Randevu</div>
  <div class="menu" onclick="show('location')">📍 Konum</div>
  <div class="menu" onclick="show('contact')">📞 İletişim</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    Hoşgeldiniz
  </div>
</div>

<!-- CONTACT (FIXED) -->
<div id="contact" class="page">
  <h2>İletişim</h2>

  <div class="card">
    📞 0531 972 45 08<br><br>
    📞 0544 624 56 54<br><br>
    📍 Başakşehir İstanbul<br><br>
    ✉️ aykutakyurt2@gmail.com
  </div>
</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>
function show(id){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
