<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:#eef1f6;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  z-index:1000;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#111;
  color:white;
  position:fixed;
  padding:20px;
  padding-top:60px;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#1f1f1f;
  border-radius:10px;
  cursor:pointer;
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:220px;
  padding:20px;
  padding-top:60px;
}

/* SECTIONS */
.section{
  display:none;
}

.section.active{
  display:block;
}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#fff,#eaeaea);
  border-radius:15px;
  text-align:center;
}

.hero h1{font-size:50px;}
.hero p{color:#666;margin-top:10px;}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:15px;
  width:220px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* IFRAME */
iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:12px;
}

/* ADMIN */
.admin{
  display:none;
  padding:20px;
}

.login-box{
  max-width:300px;
  margin:auto;
  margin-top:100px;
  background:white;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

/* FLOAT */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
}

@media(max-width:768px){
  .sidebar{width:70px;}
  .content{margin-left:70px;}
}
</style>
</head>

<body>

<div class="topbar">Kısmet Rot Balans | Sistem V28</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="menu active" onclick="show('home',this)">Ana</div>
  <div class="menu" onclick="show('services',this)">Hizmet</div>
  <div class="menu" onclick="show('randevu',this)">Randevu</div>
  <div class="menu" onclick="show('admin',this)">Admin</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <div>
      <h1>Kısmet Rot Balans</h1>
      <p>Profesyonel Oto Servis Sistemi</p>
    </div>
  </div>
</div>

<!-- SERVICES -->
<div id="services" class="section">

  <h2>Hizmetler</h2>

  <div class="cards">
    <div class="card">Rot Ayarı<br><b>700 TL</b></div>
    <div class="card">Balans<br><b>500 TL</b></div>
    <div class="card">Yağ Değişimi<br><b>200 TL</b></div>
  </div>

</div>

<!-- RANDEVU -->
<div id="randevu" class="section">

  <h2>Randevu Al</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

<!-- ADMIN -->
<div id="admin" class="section">

  <div id="login" class="login-box">
    <h3>Admin Giriş</h3>
    <input type="password" id="pass" placeholder="Şifre">
    <button onclick="login()">Giriş</button>
  </div>

  <div id="panel" style="display:none;">
    <h2>Randevu Paneli</h2>

    <p>Buraya sonra Google Sheet bağlanacak</p>

  </div>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>
function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');
}

/* ADMIN LOGIN */
function login(){
  let pass=document.getElementById('pass').value;

  if(pass=="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
  }else{
    alert("Hatalı şifre");
  }
}
</script>

</body>
</html>
