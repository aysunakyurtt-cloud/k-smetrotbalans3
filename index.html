<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  display:flex;
  background:#f4f6fa;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#111;
  color:white;
  padding:20px;
  position:fixed;
}

.menu{
  padding:12px;
  margin-bottom:10px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.menu:hover{
  transform:translateX(5px);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:220px;
  width:100%;
  padding:20px;
}

/* SECTIONS */
.section{
  display:none;
  animation:fade 0.3s ease-in-out;
}

.section.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#ffffff,#e9e9e9);
  border-radius:15px;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:50px;
}

.hero p{
  color:#666;
  margin-top:10px;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:20px;
  margin:10px;
  border-radius:15px;
  width:200px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IFRAME */
iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{width:70px;}
  .content{margin-left:70px;}
  .menu{font-size:12px;}
  .hero h1{font-size:32px;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="menu active" onclick="show('home',this)">Ana</div>
  <div class="menu" onclick="show('services',this)">Hizmet</div>
  <div class="menu" onclick="show('randevu',this)">Randevu</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <div>
      <h1>Kısmet Rot Balans</h1>
      <p>Güvenilir | Hızlı | Profesyonel Oto Servis</p>
      <p>İstanbul’da kaliteli hizmet</p>
    </div>
  </div>

  <div style="margin-top:20px;">
    <h2>Neden Bizi Seçmelisiniz?</h2>

    <div class="cards">
      <div class="card">✔ Uzman Ekip</div>
      <div class="card">✔ Hızlı İşlem</div>
      <div class="card">✔ Uygun Fiyat</div>
      <div class="card">✔ Garantili Hizmet</div>
    </div>
  </div>

</div>

<!-- SERVICES -->
<div id="services" class="section">

  <h2>Hizmetler</h2>

  <div class="cards">
    <div class="card">Rot Ayarı<br><b>700 TL</b></div>
    <div class="card">Balans<br><b>500 TL</b></div>
    <div class="card">Yağ Değişimi<br><b>200 TL</b></div>
  </div>

  <div style="margin-top:20px;">
    <h2>Konum</h2>

    <iframe src="https://www.google.com/maps/embed?pb=!1m18"></iframe>
  </div>

</div>

<!-- RANDEVU -->
<div id="randevu" class="section">

  <h2>Randevu Al</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

</div>

<!-- WHATSAPP -->
<a class="wp" href="https://wa.me/905319724508" target="_blank">
WhatsApp
</a>

<script>
function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  location.hash=id;
}
</script>

</body>
</html>
