<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oto Servis CRM FINAL</title>

<style>
:root{
  --dark:#0f172a;
  --primary:#2563eb;
  --bg:#f1f5f9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
}

/* TOP */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--dark);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:600;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--dark);
  position:fixed;
  padding-top:70px;
}

.menu{
  margin:10px;
  padding:12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:80px 20px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* DELETE */
.del{
  background:red;
  padding:6px 10px;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
</style>
</head>

<body>

<div class="topbar">Oto Servis CRM FINAL | Profesyonel Sistem</div>

<div class="sidebar">
  <div class="menu active" onclick="show('dash',this)">Dashboard</div>
  <div class="menu" onclick="show('yeni',this)">Yeni Kayıt</div>
  <div class="menu" onclick="show('liste',this)">Kayıtlar</div>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dash" class="section active">

  <div class="grid">

    <div class="card">
      Toplam Kayıt<br>
      <h2 id="total">0</h2>
    </div>

    <div class="card">
      Toplam Gelir<br>
      <h2 id="gelir">0 TL</h2>
    </div>

    <div class="card">
      Bugün İşlem<br>
      <h2 id="today">0</h2>
    </div>

  </div>

</div>

<!-- YENİ -->
<div id="yeni" class="section">

  <h2>Yeni Servis Kaydı</h2>

  <input id="isim" placeholder="Müşteri Adı">
  <input id="plaka" placeholder="Araç Plaka">
  <input id="hizmet" placeholder="İşlem">
  <input id="fiyat" placeholder="Fiyat (TL)">
  <textarea id="not" placeholder="Servis Notu"></textarea>

  <button onclick="ekle()">Kaydet</button>

</div>

<!-- LİSTE -->
<div id="liste" class="section">

  <input id="search" placeholder="Plaka veya isim ara..." oninput="render()">

  <table>
    <thead>
      <tr>
        <th>İsim</th>
        <th>Plaka</th>
        <th>İşlem</th>
        <th>Fiyat</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("crm_final") || "[]");

function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let plaka=document.getElementById("plaka").value;
  let hizmet=document.getElementById("hizmet").value;
  let fiyat=parseFloat(document.getElementById("fiyat").value)||0;
  let not=document.getElementById("not").value;

  if(!isim || !plaka){
    alert("Zorunlu alanları doldur");
    return;
  }

  data.push({
    isim,plaka,hizmet,fiyat,not,date:new Date().toISOString()
  });

  localStorage.setItem("crm_final",JSON.stringify(data));

  clear();
  render();
}

function clear(){
  document.getElementById("isim").value="";
  document.getElementById("plaka").value="";
  document.getElementById("hizmet").value="";
  document.getElementById("fiyat").value="";
  document.getElementById("not").value="";
}

function render(){

  let list=document.getElementById("list");
  if(!list) return;
  list.innerHTML="";

  let search=document.getElementById("search")?.value?.toLowerCase() || "";

  let today=new Date().toISOString().split("T")[0];

  let filtered=data.filter(d=>{
    return d.isim.toLowerCase().includes(search) ||
           d.plaka.toLowerCase().includes(search);
  });

  let total=0;
  let todayCount=0;

  filtered.forEach((d,i)=>{

    total+=d.fiyat;

    if(d.date.startsWith(today)) todayCount++;

    list.innerHTML+=`
      <tr>
        <td>${d.isim}</td>
        <td>${d.plaka}</td>
        <td>${d.hizmet}</td>
        <td>${d.fiyat} TL</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText=data.length;
  document.getElementById("gelir").innerText=total+" TL";
  document.getElementById("today").innerText=todayCount;
}

function sil(i){
  data.splice(i,1);
  localStorage.setItem("crm_final",JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
