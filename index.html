<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans - Yönetim Paneli</title>

<style>
body{
  font-family:Arial;
  background:#f4f6fa;
  margin:0;
}

/* TOP */
.top{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
}

/* LAYOUT */
.container{
  display:flex;
}

/* MENU */
.menu{
  width:220px;
  background:#1c1c1c;
  color:white;
  height:100vh;
  padding:20px;
  position:fixed;
}

.menu button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* CONTENT */
.content{
  margin-left:220px;
  padding:20px;
  width:100%;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="top">
🚗 Kısmet Rot Balans - Yönetim Paneli
</div>

<div class="container">

<!-- MENU -->
<div class="menu">
<button onclick="loadData()">📋 Randevular</button>
</div>

<!-- CONTENT -->
<div class="content">
<h2>Randevular</h2>
<div id="list">Yükleniyor...</div>
</div>

</div>

<script>

// 🔥 BURAYA SHEET CSV LINKİNİ KOYACAĞIZ
const SHEET_URL = "BURAYA_SHEET_CSV_LINKİNİ_KOY";

// VERİ ÇEK
function loadData(){

fetch(SHEET_URL)
.then(res=>res.text())
.then(data=>{

let rows = data.split("\n");
let html="";

rows.forEach((r,i)=>{
if(i==0) return;

let cols = r.split(",");

if(cols.length>1){
html += `
<div class="card">
<b>${cols[0]}</b><br>
📞 ${cols[1]}<br>
🛠 ${cols[2]}<br>
📅 ${cols[3]} - ⏰ ${cols[4]}
</div>`;
}
});

document.getElementById("list").innerHTML = html;

});

}

// ilk yükleme
loadData();

</script>

</body>
</html>
