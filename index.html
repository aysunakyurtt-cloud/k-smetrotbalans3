<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oto Servis CRM V2</title>

<style>
:root{
  --dark:#0f172a;
  --primary:#2563eb;
  --bg:#f1f5f9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
}

/* TOP */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--dark);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:600;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--dark);
  position:fixed;
  padding-top:70px;
}

.menu{
  margin:10px;
  padding:12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:80px 20px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* DELETE */
.del{
  background:red;
  padding:6px 10px;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Oto Servis CRM V2 | Araç Takip Sistemi</div>

<div class="sidebar">
  <div class="menu active" onclick="show('panel',this)">Panel</div>
  <div class="menu" onclick="show('ekle',this)">Yeni Kayıt</div>
  <div class="menu" onclick="show('arac',this)">Araç Kartı</div>
</div>

<div class="content">

<!-- PANEL -->
<div id="panel" class="section active">

  <div class="card">
    Toplam İşlem: <b id="total">0</b>
  </div>

  <div class="card">
    Toplam Gelir (tahmini): <b id="gelir">0 TL</b>
  </div>

</div>

<!-- EKLE -->
<div id="ekle" class="section">

  <h2>Yeni Servis Kaydı</h2>

  <input id="isim" placeholder="Müşteri Adı">
  <input id="plaka" placeholder="Araç Plaka">
  <input id="hizmet" placeholder="Yapılan İşlem">
  <input id="fiyat" placeholder="Ücret (TL)">
  <textarea id="not" placeholder="Not"></textarea>

  <button onclick="ekle()">Kaydet</button>

</div>

<!-- ARAÇ KART -->
<div id="arac" class="section">

  <input id="search" placeholder="Plaka ile araç ara..." oninput="render()">

  <table>
    <thead>
      <tr>
        <th>Plaka</th>
        <th>Müşteri</th>
        <th>İşlem</th>
        <th>Fiyat</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("crm") || "[]");

function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let plaka=document.getElementById("plaka").value;
  let hizmet=document.getElementById("hizmet").value;
  let fiyat=parseFloat(document.getElementById("fiyat").value) || 0;
  let not=document.getElementById("not").value;

  if(!isim || !plaka || !hizmet){
    alert("Zorunlu alanları doldur");
    return;
  }

  data.push({
    isim,plaka,hizmet,fiyat,not,date:new Date().toISOString()
  });

  localStorage.setItem("crm",JSON.stringify(data));

  alert("Kayıt eklendi");

  render();
}

function render(){

  let list=document.getElementById("list");
  if(!list) return;
  list.innerHTML="";

  let search=document.getElementById("search")?.value?.toLowerCase() || "";

  let filtered = data.filter(d=>{
    return d.plaka.toLowerCase().includes(search);
  });

  let toplam = 0;

  filtered.forEach((d,i)=>{
    toplam += d.fiyat;

    list.innerHTML+=`
      <tr>
        <td>${d.plaka}</td>
        <td>${d.isim}</td>
        <td>${d.hizmet}</td>
        <td>${d.fiyat} TL</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = data.length;
  document.getElementById("gelir").innerText = toplam + " TL";
}

function sil(i){
  data.splice(i,1);
  localStorage.setItem("crm",JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
