<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
:root{
  --dark:#0f172a;
  --primary:#2563eb;
  --bg:#f1f5f9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
}

/* TOP */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--dark);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:600;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--dark);
  position:fixed;
  padding-top:70px;
}

.menu{
  margin:10px;
  padding:12px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:80px 20px;
}

/* HERO */
.hero{
  background:white;
  padding:70px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* SECTION */
.section{display:none;}
.section.active{display:block;}

/* CARD */
.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

/* DELETE */
.del{
  background:red;
  padding:6px 10px;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* TOAST */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#22c55e;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="topbar">Kısmet Rot Balans | Randevu Sistemi</div>

<div class="sidebar">
  <div class="menu active" onclick="show('home',this)">Ana Sayfa</div>
  <div class="menu" onclick="show('services',this)">Hizmetler</div>
  <div class="menu" onclick="show('randevu',this)">Randevu</div>
  <div class="menu" onclick="show('admin',this)">Randevular</div>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>Kısmet Rot Balans</h1>
    <p>Profesyonel Oto Servis Sistemi</p>
  </div>
</div>

<!-- SERVICES -->
<div id="services" class="section">
  <div class="card">🚗 Rot Ayarı - 700 TL</div>
  <div class="card">⚙️ Balans - 500 TL</div>
  <div class="card">🛢️ Yağ Değişimi - 200 TL</div>
</div>

<!-- RANDEVU -->
<div id="randevu" class="section">
  <h2>Randevu Al</h2>

  <input id="isim" placeholder="Ad Soyad">
  <input id="tel" placeholder="Telefon">
  <input id="hizmet" placeholder="Hizmet">
  <input id="tarih" type="date">
  <input id="saat" type="time">

  <button onclick="ekle()">Randevu Oluştur</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h2>Randevular</h2>

  <table>
    <thead>
      <tr>
        <th>İsim</th>
        <th>Telefon</th>
        <th>Hizmet</th>
        <th>Tarih</th>
        <th>Saat</th>
        <th>Sil</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<div id="toast"></div>

<script>

let data = JSON.parse(localStorage.getItem("randevular") || "[]");

function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  render();
}

function ekle(){

  let isim=document.getElementById("isim").value;
  let tel=document.getElementById("tel").value;
  let hizmet=document.getElementById("hizmet").value;
  let tarih=document.getElementById("tarih").value;
  let saat=document.getElementById("saat").value;

  if(!isim || !tel || !hizmet || !tarih || !saat){
    alert("Tüm alanları doldur");
    return;
  }

  data.push({isim,tel,hizmet,tarih,saat});
  localStorage.setItem("randevular",JSON.stringify(data));

  toast("Randevu eklendi");

  document.getElementById("isim").value="";
  document.getElementById("tel").value="";
  document.getElementById("hizmet").value="";
  document.getElementById("tarih").value="";
  document.getElementById("saat").value="";

  render();
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    list.innerHTML+=`
      <tr>
        <td>${d.isim}</td>
        <td>${d.tel}</td>
        <td>${d.hizmet}</td>
        <td>${d.tarih}</td>
        <td>${d.saat}</td>
        <td><button class="del" onclick="sil(${i})">X</button></td>
      </tr>
    `;
  });
}

function sil(i){
  data.splice(i,1);
  localStorage.setItem("randevular",JSON.stringify(data));
  render();
  toast("Randevu silindi");
}

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";

  setTimeout(()=>{
    t.style.display="none";
  },2000);
}

render();

</script>

</body>
</html>
