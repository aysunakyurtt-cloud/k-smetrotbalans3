<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  display:flex;
  min-height:100vh;
  background:#f5f7fb;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#ffffff;
  border-right:1px solid #e6e6e6;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.tab{
  display:block;
  padding:12px;
  margin-bottom:10px;
  background:#f1f3f6;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.tab:hover{
  background:#e6e9ef;
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

.box{
  background:white;
  padding:20px;
  border-radius:14px;
  border:1px solid #eee;
  max-width:700px;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:10px 14px;
  margin-top:10px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.green{background:#22c55e;color:white;}
.dark{background:#1a1a1a;color:white;}
.blue{background:#2563eb;color:white;}

.price{
  margin:8px 0;
  padding:10px;
  background:#f7f7f7;
  border-radius:8px;
}

/* MOBILE */
@media(max-width:700px){
  body{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚗 Kısmet Rot</h2>

  <div class="tab" onclick="show('hizmet')">🔧 Hizmetler & Fiyat</div>
  <div class="tab" onclick="show('randevu')">📅 Randevu</div>
  <div class="tab" onclick="show('urun')">🛢️ Ürünler</div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- HİZMET -->
  <div id="hizmet" class="section">

    <div class="box">
      <h3>Hizmetler & Fiyat Listesi</h3>

      <div class="price">Rot Ayarı — <b>700 TL</b></div>
      <div class="price">Balans — <b>500 TL</b></div>
      <div class="price">Yağ Değişimi — <b>200 TL</b></div>

    </div>

  </div>

  <!-- RANDEVU -->
  <div id="randevu" class="section" style="display:none;">

    <div class="box">
      <h3>Randevu Sistemi</h3>

      <a class="btn dark"
         href="https://forms.gle/m1A8Qbh8cUpkaRTu6"
         target="_blank">
         📅 Randevu Al
      </a>

      <a class="btn green"
         href="https://wa.me/905319724508?text=Randevu%20almak%20istiyorum"
         target="_blank">
         WhatsApp
      </a>

    </div>

  </div>

  <!-- ÜRÜN -->
  <div id="urun" class="section" style="display:none;">

    <div class="box">
      <h3>Ürünler & Aksesuar</h3>

      <div class="price">Motor Yağı — <b>500 TL</b></div>
      <div class="price">Fren Spreyi — <b>150 TL</b></div>
      <div class="price">Antifriz — <b>250 TL</b></div>

    </div>

  </div>

</div>

<script>
function show(id){
  document.getElementById("hizmet").style.display="none";
  document.getElementById("randevu").style.display="none";
  document.getElementById("urun").style.display="none";

  document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
