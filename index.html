<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
:root{
  --dark:#0f172a;
  --primary:#2563eb;
  --bg:#f1f5f9;
  --card:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system;
}

body{
  background:var(--bg);
  color:#111;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:var(--dark);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:600;
  z-index:1000;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--dark);
  position:fixed;
  top:0;
  left:0;
  padding-top:70px;
}

.menu{
  margin:10px;
  padding:12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:.2s;
  background:rgba(255,255,255,0.05);
}

.menu:hover{
  background:rgba(255,255,255,0.15);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:80px 25px 25px;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#fff,#e2e8f0);
  padding:80px 20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.hero h1{
  font-size:42px;
  margin-bottom:10px;
}

/* SECTION */
.section{display:none;}
.section.active{display:block;}

/* CARD */
.card{
  background:var(--card);
  padding:18px;
  margin:10px 0;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

input:focus{
  border-color:var(--primary);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
}

button:hover{
  opacity:0.9;
}

/* TABLE */
table{
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
}

th,td{
  padding:12px;
  text-align:left;
  border-bottom:1px solid #eee;
}

th{
  background:#f8fafc;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 16px;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="topbar">Kısmet Rot Balans | Yönetim Paneli</div>

<div class="sidebar">
  <div class="menu active" onclick="show('home',this)">Ana Sayfa</div>
  <div class="menu" onclick="show('services',this)">Hizmetler</div>
  <div class="menu" onclick="show('randevu',this)">Randevu</div>
  <div class="menu" onclick="show('admin',this)">Admin</div>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>Kısmet Rot Balans</h1>
    <p>Profesyonel Oto Servis & Randevu Sistemi</p>
  </div>
</div>

<!-- SERVICES -->
<div id="services" class="section">
  <h2>Hizmetler</h2>

  <div class="card">🚗 Rot Ayarı - 700 TL</div>
  <div class="card">⚙️ Balans - 500 TL</div>
  <div class="card">🛢️ Yağ Değişimi - 200 TL</div>
</div>

<!-- RANDEVU -->
<div id="randevu" class="section">
  <h2>Randevu Al</h2>

  <input id="isim" placeholder="Ad Soyad">
  <input id="tel" placeholder="Telefon">
  <input id="hizmet" placeholder="Hizmet">

  <button onclick="ekle()">Randevu Oluştur</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h2>Gelen Randevular</h2>

  <table>
    <thead>
      <tr>
        <th>İsim</th>
        <th>Telefon</th>
        <th>Hizmet</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>

let data = JSON.parse(localStorage.getItem("randevular") || "[]");

function show(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  el.classList.add('active');

  render();
}

function ekle(){
  let isim = document.getElementById("isim").value;
  let tel = document.getElementById("tel").value;
  let hizmet = document.getElementById("hizmet").value;

  if(!isim || !tel || !hizmet){
    alert("Lütfen tüm alanları doldur.");
    return;
  }

  data.push({isim,tel,hizmet});
  localStorage.setItem("randevular",JSON.stringify(data));

  alert("Randevu başarıyla oluşturuldu");

  document.getElementById("isim").value="";
  document.getElementById("tel").value="";
  document.getElementById("hizmet").value="";

  render();
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(d=>{
    list.innerHTML+=`
      <tr>
        <td>${d.isim}</td>
        <td>${d.tel}</td>
        <td>${d.hizmet}</td>
      </tr>
    `;
  });
}

render();

</script>

</body>
</html>s
