<script>
async function loadRandevular(){

  const url = "GOOGLE_SHEET_CSV_LINK_BURAYA";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  let html = "";

  rows.forEach(r=>{
    const cols = r.split(",");

    if(cols.length > 1){
      html += `
        <div class="randevu">
          <div>${cols[1]} - ${cols[2] || "Hizmet"}</div>
          <div class="badge">Yeni</div>
        </div>
      `;
    }
  });

  document.querySelector(".panel").innerHTML = html;
}

loadRandevular();
</script>
