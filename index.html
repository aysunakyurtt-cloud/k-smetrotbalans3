<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:white;}
.center{text-align:center;padding:80px;}
.hidden{display:none;}
input{padding:10px;margin:5px;width:200px;}
button{padding:10px;background:#2563eb;color:white;border:none;}
.card{background:#111827;padding:10px;margin:10px;border-radius:10px;}
</style>
</head>

<body>

<!-- LANDING -->
<div id="home" class="center">
  <h1>Oto Servis Sistemi</h1>
  <button onclick="start()">Sisteme Gir</button>
</div>

<!-- APP -->
<div id="app" class="hidden center">

  <input id="isim" placeholder="Müşteri">
  <input id="hizmet" placeholder="Hizmet">
  <input id="fiyat" placeholder="Fiyat">

  <br>
  <button onclick="ekle()">Kaydet</button>

  <div id="list"></div>

</div>

<script>

let data=[];

function start(){
  document.getElementById("home").style.display="none";
  document.getElementById("app").style.display="block";
}

function ekle(){

  data.push({
    isim:isim.value,
    hizmet:hizmet.value,
    fiyat:fiyat.value
  });

  render();
}

function render(){

  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(d=>{
    list.innerHTML+=`
      <div class="card">
        ${d.isim} - ${d.hizmet} - ${d.fiyat} TL
      </div>
    `;
  });

}

</script>

</body>
</html>
