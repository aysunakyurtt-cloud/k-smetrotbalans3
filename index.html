<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --sidebar:#0f0f0f;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  display:flex;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR (HER ZAMAN SABİT) */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--sidebar);
  color:white;
  padding:25px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar h2{
  margin-bottom:20px;
  font-size:18px;
}

/* MENÜ */
.menu{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  transition:0.2s;
}

.menu:hover{
  transform:translateX(5px);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  width:100%;
}

/* SECTIONS */
.section{
  display:none;
  padding:40px;
  animation:fade 0.3s ease;
}

.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* HERO */
.hero{
  height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(135deg,#fff,#f2f4f7);
}

.hero h1{
  font-size:60px;
}

.hero p{
  color:var(--muted);
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:white;
  border:1px solid var(--border);
  padding:20px;
  border-radius:14px;
  width:250px;
}

/* MAP */
iframe{
  width:100%;
  max-width:800px;
  height:320px;
  border:none;
  border-radius:16px;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}

/* 🔥 MOBİL DÜZELTME */
@media(max-width:768px){

  body{
    display:flex;
  }

  /* sidebar DARALIR AMA KALIR */
  .sidebar{
    width:70px;
    padding:10px;
  }

  .sidebar h2{
    display:none;
  }

  .menu{
    justify-content:center;
    font-size:12px;
    padding:10px;
  }

  .menu span{
    display:none;
  }

  .content{
    margin-left:70px;
  }

  .hero h1{
    font-size:34px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>🚗</h2>

  <div class="menu active" onclick="show('home', this)">
    <i class="fa fa-home"></i><span>Ana</span>
  </div>

  <div class="menu" onclick="show('services', this)">
    <i class="fa fa-wrench"></i><span>Hizmet</span>
  </div>

  <div class="menu" onclick="show('booking', this)">
    <i class="fa fa-calendar"></i><span>Randevu</span>
  </div>

  <div class="menu" onclick="show('map', this)">
    <i class="fa fa-location-dot"></i><span>Konum</span>
  </div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <div>
      <h1>Kısmet Rot Balans</h1>
      <p>Profesyonel oto servis</p>
    </div>
  </div>
</div>

<!-- SERVICES -->
<div id="services" class="section">

  <h2>Hizmetler</h2>

  <div class="cards">
    <div class="card">Rot Ayarı<br><b>700 TL</b></div>
    <div class="card">Balans<br><b>500 TL</b></div>
    <div class="card">Yağ Değişimi<br><b>200 TL</b></div>
  </div>

</div>

<!-- BOOKING -->
<div id="booking" class="section">

  <h2>Randevu</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

<!-- MAP -->
<div id="map" class="section">

  <h2>Konum</h2>

  <iframe src="https://www.google.com/maps/embed?pb=!1m18..."></iframe>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>
function show(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  if(el) el.classList.add('active');
}
</script>

</body>
</html>
