<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --sidebar:#0f0f0f;
  --sideText:white;
}

body.dark{
  --bg:#0b0f19;
  --card:#111827;
  --text:#ffffff;
  --muted:#9ca3af;
  --border:#1f2937;
  --sidebar:#000000;
  --sideText:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, Arial;
}

body{
  display:flex;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--sidebar);
  color:var(--sideText);
  padding:25px;
  position:fixed;
  transition:0.3s;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:25px;
}

/* MENU */
.menu{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  color:var(--sideText);
  text-decoration:none;
  cursor:pointer;
  transition:0.2s;
  background:rgba(255,255,255,0.05);
}

.menu:hover{
  transform:translateX(5px);
  background:rgba(255,255,255,0.1);
}

.menu.active{
  background:white;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  width:100%;
}

/* SECTIONS */
.section{
  display:none;
  padding:40px;
  animation:fade 0.3s ease;
}

.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* HERO */
.hero{
  height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(135deg,#fff, #f2f4f7);
}

body.dark .hero{
  background:linear-gradient(135deg,#0b0f19,#111827);
}

.hero h1{
  font-size:65px;
  font-weight:900;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

.btn{
  margin-top:20px;
  display:inline-block;
  padding:14px 22px;
  background:#111827;
  color:white;
  border-radius:12px;
  text-decoration:none;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  border-radius:14px;
  width:250px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* INFO */
.info{
  max-width:800px;
  margin:auto;
  background:var(--card);
  padding:25px;
  border-radius:16px;
  border:1px solid var(--border);
  color:var(--muted);
  line-height:1.6;
}

/* MAP */
iframe{
  width:100%;
  max-width:800px;
  height:320px;
  border:none;
  border-radius:16px;
}

/* THEME BUTTON */
.theme{
  position:fixed;
  top:20px;
  right:20px;
  background:var(--card);
  border:1px solid var(--border);
  padding:10px 12px;
  border-radius:50px;
  cursor:pointer;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚗 Kısmet Rot</h2>

  <div class="menu active" onclick="show('home', this)">
    <i class="fa fa-home"></i> Ana Sayfa
  </div>

  <div class="menu" onclick="show('services', this)">
    <i class="fa fa-wrench"></i> Hizmetler
  </div>

  <div class="menu" onclick="show('booking', this)">
    <i class="fa fa-calendar"></i> Randevu
  </div>

  <div class="menu" onclick="show('map', this)">
    <i class="fa fa-location-dot"></i> Konum
  </div>
</div>

<!-- THEME BUTTON -->
<div class="theme" onclick="toggleTheme()">
  🌙 / ☀️
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <div>

      <h1>Kısmet Rot Balans</h1>
      <p>Profesyonel oto servis – İstanbul</p>

      <a class="btn" onclick="show('booking')">Randevu Al</a>

    </div>
  </div>

</div>

<!-- SERVICES -->
<div id="services" class="section">

  <h2>Hizmetler</h2>

  <div class="cards">
    <div class="card">Rot Ayarı<br><b>700 TL</b></div>
    <div class="card">Balans<br><b>500 TL</b></div>
    <div class="card">Yağ Değişimi<br><b>200 TL</b></div>
  </div>

</div>

<!-- BOOKING -->
<div id="booking" class="section">

  <h2>Randevu</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

<!-- MAP -->
<div id="map" class="section">

  <h2>Konum</h2>

  <iframe src="https://www.google.com/maps/embed?pb=!1m18..."></iframe>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<script>
function show(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  if(el) el.classList.add('active');
}

/* DARK MODE */
function toggleTheme(){
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
