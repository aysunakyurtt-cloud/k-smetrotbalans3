<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
:root{
  --primary:#111;
  --bg:#f5f7fb;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  display:flex;
  background:var(--bg);
}

/* SOL MENÜ */
.sidebar{
  width:230px;
  background:#111;
  color:white;
  height:100vh;
  padding:20px;
  position:fixed;
}

.sidebar h2{
  margin-bottom:20px;
}

.menu a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  background:#1c1c1c;
  border-radius:8px;
  cursor:pointer;
  text-decoration:none;
  color:white;
}

.menu a:hover{
  background:#333;
}

/* İÇERİK */
.content{
  margin-left:230px;
  padding:30px;
  width:100%;
}

.section{
  display:none;
}

.active{
  display:block;
}

/* HERO */
.hero{
  background:white;
  padding:40px;
  border-radius:12px;
}

.hero h1{
  font-size:32px;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:250px;
}

.price{
  margin-top:10px;
  font-weight:bold;
  color:var(--primary);
}

/* MAP */
iframe{
  width:100%;
  max-width:700px;
  height:300px;
  border:none;
  border-radius:12px;
  margin-top:20px;
}

/* FORM */
.form iframe{
  height:650px;
}

/* WP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- SOL MENÜ -->
<div class="sidebar">
  <h2>🚗 Kısmet</h2>

  <div class="menu">
    <a onclick="show('anasayfa')">Ana Sayfa</a>
    <a onclick="show('hizmet')">Hizmet & Fiyat</a>
    <a onclick="show('konum')">Konum</a>
    <a onclick="show('randevu')">Randevu Al</a>
  </div>
</div>

<!-- İÇERİK -->
<div class="content">

<!-- ANA SAYFA -->
<div id="anasayfa" class="section active">
  <div class="hero">
    <h1>Profesyonel Oto Servis</h1>
    <p>20 yıllık tecrübe ile rot, balans ve araç bakım hizmetleri</p>
  </div>
</div>

<!-- HİZMET -->
<div id="hizmet" class="section">

<h2>Hizmetler & Fiyatlar</h2>

<div class="cards">

<div class="card">
Rot Ayarı
<div class="price">700 TL</div>
</div>

<div class="card">
Balans
<div class="price">500 TL</div>
</div>

<div class="card">
Yağ Değişimi
<div class="price">200 TL</div>
</div>

</div>

</div>

<!-- KONUM -->
<div id="konum" class="section">

<h2>Konumumuz</h2>

<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3008.2688179220972!2d28.743977275861436!3d41.06311627134291!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14caa666db77665b%3A0xa3126deb0757b8f9!2zw5Z6ZWwgRGF5xLFvxJ9sdSBUxLFwIE1lcmtlemk!5e0!3m2!1str!2str!4v1777462009673!5m2!1str!2str"></iframe>

</div>

<!-- RANDEVU -->
<div id="randevu" class="section form">

<h2>Online Randevu</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508" target="_blank">WhatsApp</a>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
