<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kısmet Rot Balans</title>

<style>
body{margin:0;font-family:system-ui;background:#f4f6f8;}

header{
  background:#111;color:#fff;
  padding:15px;text-align:center;
}

nav{
  display:flex;justify-content:center;
  gap:15px;background:#1c1c1c;
  padding:10px;
}

nav a{color:white;text-decoration:none;font-size:14px;}

.hero{
  text-align:center;
  padding:50px 20px;
  background:linear-gradient(135deg,#fff,#ddd);
}

.hero h1{font-size:40px;margin:0;}

.section{
  max-width:900px;
  margin:auto;
  padding:30px 20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.wp{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h2>Kısmet Rot Balans</h2>
  <p>Oto Servis & Rot Balans</p>
</header>

<nav>
  <a href="#hizmet">Hizmetler</a>
  <a href="#fiyat">Fiyatlar</a>
  <a href="#randevu">Randevu</a>
  <a href="#konum">Konum</a>
</nav>

<div class="hero">
  <h1>Güvenli Sürüş İçin Doğru Adres</h1>
</div>

<!-- HİZMET -->
<div class="section" id="hizmet">
  <h2>Hizmetler</h2>

  <div class="grid">
    <div class="card">🔧 Rot Ayarı</div>
    <div class="card">⚖️ Balans</div>
    <div class="card">🛞 Lastik Değişimi</div>
    <div class="card">🛠 Bakım</div>
  </div>
</div>

<!-- FİYAT -->
<div class="section" id="fiyat">
  <h2>Fiyat Listesi</h2>

  <div class="card">Rot Ayarı: 700 TL</div>
  <div class="card">Balans: 500 TL</div>
  <div class="card">Lastik: 200 TL</div>
</div>

<!-- RANDEVU -->
<div class="section" id="randevu">
  <h2>Randevu Al</h2>

  <div class="card">
    <input id="name" placeholder="İsim">
    <input id="phone" placeholder="Telefon">

    <select id="time">
      <option value="">Saat seç</option>
      <option>09:00</option>
      <option>10:00</option>
      <option>11:00</option>
      <option>13:00</option>
      <option>14:00</option>
    </select>

    <button onclick="save()">Randevu Gönder</button>
    <p id="msg"></p>
  </div>
</div>

<!-- KONUM -->
<div class="section" id="konum">
  <h2>Konum</h2>

  <div class="card">
    <p>📍 Kısmet Rot Balans</p>

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18..."
      width="100%" height="300"
      style="border:0;border-radius:10px;">
    </iframe>
  </div>
</div>

<a class="wp" href="https://wa.me/905319724508">WhatsApp</a>

<!-- FIREBASE (STABİL VERSİYON) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBkBB4w03UMQ2dFKY-B_1dgOZGnk-J5dLg",
  authDomain: "kismet-rot-balans.firebaseapp.com",
  projectId: "kismet-rot-balans",
  storageBucket: "kismet-rot-balans.appspot.com",
  messagingSenderId: "350629465784",
  appId: "1:350629465784:web:33f91cad2a724e0f45ee4d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>

async function save(){

  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const time=document.getElementById("time").value;
  const msg=document.getElementById("msg");

  if(!name || !phone || !time){
    msg.innerText="Boş bırakma ❌";
    return;
  }

  try{

    const check = await db.collection("randevular")
      .where("time","==",time)
      .get();

    if(!check.empty){
      msg.innerText="Bu saat dolu ❌";
      return;
    }

    await db.collection("randevular").add({
      name, phone, time
    });

    msg.innerText="Randevu alındı ✔";

  }catch(e){
    console.log(e);
    msg.innerText="Hata ❌ (Rules kontrol et)";
  }
}

</script>

</body>
</html>
