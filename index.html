<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
:root{
  --primary:#111;
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#1a1a1a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:var(--bg);color:var(--text);}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:white;
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  border-bottom:1px solid #eee;
  z-index:999;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px;
}

.hero h1{font-size:40px;}

.btn{
  display:inline-block;
  padding:12px 18px;
  margin:10px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

.primary{background:var(--primary);color:white;}

/* SECTION */
.section{padding:60px 20px;text-align:center;}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  width:260px;
  border:1px solid #eee;
  cursor:pointer;
}

.card.active{
  border:2px solid var(--primary);
}

.price{margin-top:10px;font-weight:bold;color:var(--primary);}

/* PANEL */
.panel{
  position:fixed;
  top:20px;
  right:20px;
  background:white;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* WP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
}

footer{text-align:center;padding:20px;font-size:12px;color:#777;}
</style>
</head>

<body>

<!-- RENK -->
<div class="panel">
  🎨 <input type="color" id="color">
</div>

<!-- HEADER -->
<div class="header">
  <b>🚗 Kısmet Rot Balans</b>
  <div>
    <a href="#hizmet">Hizmet</a>
    <a href="#randevu">Randevu</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Profesyonel Oto Servis</h1>
  <p>Rot • Balans • Yağ</p>

  <a class="btn primary" href="#randevu">Randevu Al</a>
</div>

<!-- HİZMET -->
<div id="hizmet" class="section">

<h2>Hizmet Seç</h2>

<div class="cards">

<div class="card" onclick="selectService(this,'Rot Ayarı - 700 TL')">
Rot Ayarı
<div class="price">700 TL</div>
</div>

<div class="card" onclick="selectService(this,'Balans - 500 TL')">
Balans
<div class="price">500 TL</div>
</div>

<div class="card" onclick="selectService(this,'Yağ Değişimi - 200 TL')">
Yağ Değişimi
<div class="price">200 TL</div>
</div>

</div>

</div>

<!-- RANDEVU -->
<div id="randevu" class="section">

<h2>Randevu</h2>

<p id="secili">Seçilen hizmet: Yok</p>

<br>

<a id="randevuBtn" class="btn primary" target="_blank">
📅 Randevu Oluştur
</a>

</div>

<footer>© 2026</footer>

<a class="wp" href="https://wa.me/905319724508" target="_blank">WhatsApp</a>

<script>
// RENK
document.getElementById("color").addEventListener("input", e=>{
  document.documentElement.style.setProperty("--primary", e.target.value);
});

// HİZMET SEÇ
let seciliHizmet="";

function selectService(el, hizmet){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  seciliHizmet=hizmet;
  document.getElementById("secili").innerText="Seçilen hizmet: "+hizmet;

  document.getElementById("randevuBtn").href=
  "https://wa.me/905319724508?text=Randevu almak istiyorum: "+hizmet;
}
</script>

</body>
</html>
