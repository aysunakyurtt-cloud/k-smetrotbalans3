<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
:root{
  --primary:#111;
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#1a1a1a;
  --muted:#666;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* TOP */
.header{
  background:var(--card);
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  background:var(--card);
}

.hero h1{
  font-size:40px;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

.btn{
  display:inline-block;
  padding:12px 18px;
  margin:8px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.primary{
  background:var(--primary);
  color:white;
}

/* SECTIONS */
.section{
  padding:60px 20px;
  text-align:center;
}

.title{
  font-size:24px;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  width:260px;
  border:1px solid #eee;
}

.price{
  margin-top:10px;
  font-weight:bold;
  color:var(--primary);
}

/* COLOR PANEL */
.panel{
  position:fixed;
  top:20px;
  right:20px;
  background:white;
  border:1px solid #ddd;
  padding:12px;
  border-radius:12px;
  font-size:12px;
}

.panel input{
  width:80px;
  margin-top:5px;
}

/* WP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#888;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- RENK PANEL -->
<div class="panel">
  🎨 Renk Seç
  <input type="color" id="colorPicker" value="#111111">
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">🚗 Kısmet Rot Balans</div>
  <div>İstanbul</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Profesyonel Oto Servis</h1>
  <p>Rot • Balans • Yağ • Lastik</p>

  <a class="btn primary" href="#randevu">Randevu Al</a>
</div>

<!-- HİZMET -->
<div class="section">
  <div class="title">Hizmetler</div>

  <div class="cards">

    <div class="card">
      Rot Ayarı
      <div class="price">700 TL</div>
    </div>

    <div class="card">
      Balans
      <div class="price">500 TL</div>
    </div>

    <div class="card">
      Yağ Değişimi
      <div class="price">200 TL</div>
    </div>

  </div>
</div>

<!-- RANDEVU -->
<div class="section" id="randevu">
  <div class="title">Randevu</div>

  <a class="btn primary" href="https://forms.gle/m1A8Qbh8cUpkaRTu6" target="_blank">
    📅 Randevu Oluştur
  </a>
</div>

<footer>
© 2026 Kısmet Rot Balans
</footer>

<a class="wp" href="https://wa.me/905319724508" target="_blank">WhatsApp</a>

<script>
const picker = document.getElementById("colorPicker");

picker.addEventListener("input", function(){
  document.documentElement.style.setProperty("--primary", this.value);
});
</script>

</body>
</html>
