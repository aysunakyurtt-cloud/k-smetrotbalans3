<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kısmet Rot Balans</title>

<style>
:root{
  --bg:#f6f7fb;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, Arial;
}

body{
  display:flex;
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:#0f0f0f;
  color:white;
  padding:25px;
  position:fixed;

  /* 🔥 giriş animasyonu */
  animation: slideIn 0.5s ease;
}

@keyframes slideIn{
  from{
    transform:translateX(-100%);
    opacity:0;
  }
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.sidebar h2{
  font-size:18px;
  margin-bottom:25px;
}

/* MENU BUTTONS */
.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  background:#1c1c1c;
  border-radius:10px;
  color:white;
  text-decoration:none;
  cursor:pointer;

  /* 🔥 animasyon */
  transition:0.25s ease;
  position:relative;
}

/* hover efekt */
.sidebar a:hover{
  background:#2c2c2c;
  transform:translateX(6px);
}

/* aktif menü */
.sidebar a.active{
  background:#ffffff;
  color:#111;
  font-weight:600;
}

/* CONTENT */
.content{
  margin-left:240px;
  width:100%;
}

/* SECTIONS */
.section{
  display:none;
  padding:40px;

  animation: fade 0.4s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.active{
  display:block;
}

/* HERO */
.hero{
  height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  background:
    radial-gradient(circle at top, rgba(0,0,0,0.08), transparent 60%),
    linear-gradient(135deg, #ffffff, #f2f4f7);
}

.hero-box{
  max-width:750px;
}

.hero h1{
  font-size:70px;
  font-weight:900;
}

.hero p{
  margin-top:15px;
  font-size:18px;
  color:var(--muted);
}

.hero small{
  display:block;
  margin-top:10px;
  color:#9ca3af;
}

.btn{
  margin-top:25px;
  display:inline-block;
  padding:14px 22px;
  background:#111827;
  color:white;
  border-radius:12px;
  text-decoration:none;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:white;
  border:1px solid var(--border);
  padding:20px;
  border-radius:14px;
  width:250px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

/* INFO */
.info{
  max-width:800px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:16px;
  border:1px solid var(--border);
  color:var(--muted);
  line-height:1.6;
}

/* MAP */
iframe{
  width:100%;
  max-width:800px;
  height:320px;
  border:none;
  border-radius:16px;
}

/* FORM */
.form iframe{
  height:700px;
}

/* WHATSAPP */
.wp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚗 Kısmet Rot</h2>

  <a class="menu active" onclick="show('home', this)">Ana Sayfa</a>
  <a class="menu" onclick="show('services', this)">Hizmetler</a>
  <a class="menu" onclick="show('booking', this)">Randevu</a>
  <a class="menu" onclick="show('map', this)">Konum</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <div class="hero-box">

      <h1>Kısmet Rot Balans</h1>

      <p>İstanbul’da profesyonel oto servis<br>Rot • Balans • Yağ Değişimi</p>

      <small>Güvenli sürüş için doğru adres</small>

      <a class="btn" onclick="show('booking')">Online Randevu Al</a>

    </div>
  </div>

</div>

<!-- SERVICES -->
<div id="services" class="section">

  <h2>Hizmetler & Fiyatlar</h2>

  <div class="cards">

    <div class="card">Rot Ayarı <br><b>700 TL</b></div>
    <div class="card">Balans <br><b>500 TL</b></div>
    <div class="card">Yağ Değişimi <br><b>200 TL</b></div>

  </div>

</div>

<!-- BOOKING -->
<div id="booking" class="section form">

  <h2>Online Randevu</h2>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe28-lt5KYCn39-JuJoA60aitTXqajL1VlUNX5b2LQk8HB0dQ/viewform?embedded=true"></iframe>

</div>

<!-- MAP -->
<div id="map" class="section">

  <h2>Konum</h2>

  <iframe src="https://www.google.com/maps/embed?pb=!1m18..."></iframe>

</div>

</div>

<a class="wp" href="https://wa.me/905319724508" target="_blank">WhatsApp</a>

<script>
function show(id, el){

  // sayfa değiştir
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // menü active efekti
  document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
  if(el) el.classList.add('active');
}
</script>

</body>
</html>
