<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kısmet Rot Balans | İstanbul Rot & Balans Servisi</title>

  <meta name="description" content="Kısmet Rot Balans - İstanbul'da profesyonel rot, balans ve lastik hizmetleri.">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f6f7fb;
      color: #1a1a1a;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      color: #555;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #666;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      margin: 5px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn-dark {
      background: #1a1a1a;
      color: white;
    }

    .btn-green {
      background: #00c853;
      color: white;
    }

    .btn-blue {
      background: #0b3d91;
      color: white;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      border: 1px solid #eee;
      padding: 20px;
      width: 260px;
      border-radius: 12px;
      text-align: left;
    }

    .card h3 {
      margin-bottom: 8px;
    }

    .price {
      margin-top: 10px;
      color: #00c853;
      font-weight: bold;
    }

    .form-box {
      max-width: 700px;
      margin: auto;
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #777;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 28px;
      }

      .card {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    📍 İstanbul | 📞 0531 972 45 08 | Kısmet Rot Balans
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Kısmet Rot Balans</h1>
    <p>Profesyonel rot, balans ve lastik servisi</p>

    <a class="btn btn-dark" href="#hizmetler">Hizmetler</a>
    <a class="btn btn-green" href="#randevu">Online Randevu</a>

    <!-- SHEET PANEL -->
    <a class="btn btn-blue" 
       href="https://docs.google.com/spreadsheets/d/1H2gKiO-X8rASTM1-ipyi060ByfnD9mQ-UvUa1Nd_s7g/edit?usp=sharing" 
       target="_blank">
       Randevuları Gör
    </a>
  </div>

  <!-- SERVICES -->
  <div id="hizmetler" class="section">
    <h2>Hizmetler & Fiyatlar</h2>

    <div class="cards">
      <div class="card">
        <h3>Rot Ayarı</h3>
        <div class="price">₺500</div>
      </div>

      <div class="card">
        <h3>Balans</h3>
        <div class="price">₺300</div>
      </div>

      <div class="card">
        <h3>Lastik</h3>
        <div class="price">₺200</div>
      </div>
    </div>
  </div>

  <!-- RANDEVU -->
  <div id="randevu" class="section">
    <h2>Online Randevu Sistemi</h2>

    <div class="form-box">

      <!-- ⚠️ BURAYA SENİN FORMUN -->
      <iframe src="https://forms.gle/FORM_LINKINI_BURAYA_YAPISTIR"></iframe>

    </div>
  </div>

  <footer>
    © 2026 Kısmet Rot Balans
  </footer>

</body>
</html>
